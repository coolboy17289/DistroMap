<?xml version="1.0" encoding="UTF-8"?>
<!--
  DistroMap logo — installed from the Figma Make export for the
  "Create logo for distroMap" design.
  See: https://www.figma.com/design/c5aE74Oiy5qzcjpZBfSm4P/Create-logo-for-distroMap

  Wide-aspect-ratio wordmark intended for dark backgrounds. Replace
  this file with a fresh export from Figma when the design evolves.
-->
<svg viewBox="0 0 560 130"
     width="560" height="130"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-label="DistroMap — Linux distribution explorer"
     style="font-family: 'Space Mono', 'Courier New', ui-monospace, monospace">
  <defs>
    <clipPath id="badge-clip">
      <circle cx="65" cy="65" r="56" />
    </clipPath>
  </defs>

  <!-- BADGE -->
  <circle cx="65" cy="65" r="60" fill="#0d1117" stroke="#30363d" stroke-width="1.5" />

  <!-- Map grid (clipped) -->
  <g clip-path="url(#badge-clip)" opacity="0.1" stroke="#e6edf3" stroke-width="0.7" fill="none">
    <line x1="5" y1="30"  x2="125" y2="30"  />
    <line x1="5" y1="45"  x2="125" y2="45"  />
    <line x1="5" y1="65"  x2="125" y2="65"  />
    <line x1="5" y1="80"  x2="125" y2="80"  />
    <line x1="5" y1="95"  x2="125" y2="95"  />
    <line x1="5" y1="110" x2="125" y2="110" />
    <line x1="20"  y1="5" x2="20"  y2="125" />
    <line x1="35"  y1="5" x2="35"  y2="125" />
    <line x1="50"  y1="5" x2="50"  y2="125" />
    <line x1="65"  y1="5" x2="65"  y2="125" />
    <line x1="80"  y1="5" x2="80"  y2="125" />
    <line x1="95"  y1="5" x2="95"  y2="125" />
    <line x1="110" y1="5" x2="110" y2="125" />
  </g>

  <!-- Inner dashed ring -->
  <circle cx="65" cy="65" r="37" fill="none" stroke="#21262d" stroke-width="1" stroke-dasharray="3 5" />

  <!-- TUX PENGUIN -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="65" cy="73" rx="12" ry="15" stroke="#e6edf3" stroke-width="1.5" />
    <ellipse cx="65" cy="77" rx="7"  ry="10" stroke="#e6edf3" stroke-width="1" />
    <circle  cx="65" cy="54" r="10"   stroke="#e6edf3" stroke-width="1.5" />
    <circle  cx="62" cy="52" r="1.5"  fill="#e6edf3" />
    <circle  cx="68" cy="52" r="1.5"  fill="#e6edf3" />
    <path d="M 63 57 L 65 61 L 67 57"   stroke="#f0883e" stroke-width="1.2" />
    <path d="M 53 69 C 50 66, 50 76, 53 79"  stroke="#e6edf3" stroke-width="1.2" />
    <path d="M 77 69 C 80 66, 80 76, 77 79"  stroke="#e6edf3" stroke-width="1.2" />
    <path d="M 58 87 L 56 91 M 58 87 L 61 91 M 58 87 L 63 90" stroke="#f0883e" stroke-width="1" />
    <path d="M 72 87 L 70 91 M 72 87 L 72 91 M 72 87 L 76 90" stroke="#f0883e" stroke-width="1" />
  </g>

  <!-- DISTRO LOGOS (ring around badge) -->
  <!-- Arch -->
  <g transform="translate(65,20)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 -8 L 7.5 6.5 L 3.5 6.5 L 0 0 L -3.5 6.5 L -7.5 6.5 Z" stroke="#1793d1" stroke-width="1.4" />
    <path d="M 0 0 L 2.8 5.5 L -2.8 5.5 Z" stroke="#1793d1" stroke-width="0.9" opacity="0.55" />
  </g>
  <!-- Ubuntu -->
  <g transform="translate(104,42)" fill="none">
    <circle cx="0"    cy="0"    r="7.5" stroke="#e95420" stroke-width="1.4" />
    <circle cx="0"    cy="-4.5" r="2.1" fill="#e95420" />
    <circle cx="3.9"  cy="2.25" r="2.1" fill="#e95420" />
    <circle cx="-3.9" cy="2.25" r="2.1" fill="#e95420" />
  </g>
  <!-- Debian -->
  <g transform="translate(104,88)" fill="none" stroke-linecap="round">
    <path d="M 1 -7.5 C 6.5 -5.5, 8.5 0, 5.5 5 C 2.5 9.5, -4 9.5, -6.5 5 C -9 0.5, -6.5 -6, -1 -7.5 C 2 -7.5, 5.5 -5, 4.5 -2 C 3.5 1, 0.5 2.5, -2 1.5 C -4 0.5, -4 -3, -1.5 -4" stroke="#d70a53" stroke-width="1.4" />
  </g>
  <!-- Fedora -->
  <g transform="translate(65,110)" fill="none" stroke-linecap="round">
    <path d="M -3 6.5 L -3 -1 C -3 -6.5, 2 -9, 5.5 -6 C 8 -3.5, 7.5 1.5, 4 3 L -3 3" stroke="#51a2da" stroke-width="1.4" />
    <line x1="-7" y1="2.5" x2="1" y2="2.5" stroke="#51a2da" stroke-width="1.4" />
  </g>
  <!-- NixOS -->
  <g transform="translate(26,88)" fill="none" stroke-linecap="round">
    <line x1="0"    y1="-7.5" x2="0"    y2="7.5"    stroke="#5277c3" stroke-width="1.4" />
    <line x1="-6.5" y1="-3.75" x2="6.5" y2="3.75"  stroke="#5277c3" stroke-width="1.4" />
    <line x1="-6.5" y1="3.75"  x2="6.5" y2="-3.75" stroke="#5277c3" stroke-width="1.4" />
    <path d="M -2.5 -5 L 0 -7.5 L 2.5 -5" stroke="#5277c3" stroke-width="1" />
    <path d="M -2.5 5 L 0 7.5 L 2.5 5" stroke="#5277c3" stroke-width="1" />
    <path d="M 5 -2.5 L 6.5 -3.75 L 5.5 -1" stroke="#5277c3" stroke-width="1" />
  </g>
  <!-- Linux Mint (leaf) -->
  <g transform="translate(26,42)" fill="none" stroke-linecap="round">
    <path d="M 0 7.5 C -5.5 4, -7 -1.5, -3 -6 C 0.5 -9, 6 -6.5, 5.5 -1 C 5 3.5, 0 7.5, 0 7.5 Z" stroke="#87cf3e" stroke-width="1.4" />
    <line x1="0" y1="7.5" x2="0" y2="-6" stroke="#87cf3e" stroke-width="0.9" opacity="0.7" />
    <path d="M 0 0 C -2 -2, -4 -1.5, -4.5 0.5" stroke="#87cf3e" stroke-width="0.8" opacity="0.7" />
  </g>

  <!-- WORDMARK -->
  <text x="150" y="73" font-size="44" letter-spacing="-1.5">
    <tspan fill="#e6edf3" font-weight="400">distro</tspan>
    <tspan fill="#58a6ff" font-weight="700">Map</tspan>
  </text>
  <text x="153" y="95" font-size="9" fill="#484f58" letter-spacing="3">LINUX DISTRIBUTION EXPLORER</text>

  <!-- Compass tick marks on outer ring -->
  <line x1="65"  y1="8"   x2="65"  y2="3"   stroke="#30363d" stroke-width="2" />
  <line x1="122" y1="65"  x2="127" y2="65"  stroke="#30363d" stroke-width="2" />
  <line x1="65"  y1="122" x2="65"  y2="127" stroke="#30363d" stroke-width="2" />
  <line x1="8"   y1="65"  x2="3"   y2="65"  stroke="#30363d" stroke-width="2" />
</svg>
