# Fly.io config for the DistroMap suggestion API.
#
# Deploy with:
#   fly launch --copy-config --no-deploy
#   # (only on first run; the rest is just)
#   fly deploy
#
# After the first `fly deploy`, create the persistent volume once:
#   fly volumes create distro_suggestions --size 1 --region iad
#
app = "distromap-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  # Suggestion log file lives inside the volume; nothing else needs
  # configuring at the env layer for the v0.5 contract.
  SUGGESTIONS_PATH = "/app/.cache/api/suggestions.json"
  # Comma-separated allow-list for cross-origin browser calls. Defaults
  # to localhost (local dev) — add the Vercel domain once it's known.
  # Allowed patterns are set in code (allow_origin_regex covers the
  # *-<hash>.vercel.app preview URLs automatically).
  ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/api/health"

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[mounts]]
  # Persistent storage for suggestions. Mount only the dir that
  # contains suggestions.json, not the whole /app, so a redeploy
  # neither wipes nor accidentally writes to binding-mounted code.
  source = "distro_suggestions"
  destination = "/app/.cache/api"
